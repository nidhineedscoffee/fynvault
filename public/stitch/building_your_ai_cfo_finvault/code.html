<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_31" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_31');
  const devicePixelRatio = window.devicePixelRatio || 1;
  // FinVault Financial Intelligence Layer Animation
// A sophisticated network of nodes representing financial entities (Customers, Invoices, Payments)
// slowly connecting and pulse-radiating intelligence.

const scene = new THREE.Scene();
const container = document.getElementById('threejs-container-ANIMATION_31') || document.body;
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
camera.position.z = 8;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

const group = new THREE.Group();
scene.add(group);

const nodes = [];
const lines = [];
const nodeCount = 40;

// Colors from FinVault Design System
const colors = [0x0f172a, 0x3b82f6, 0x64748b, 0x94a3b8];

const geo = new THREE.SphereGeometry(0.08, 16, 16);

for (let i = 0; i < nodeCount; i++) {
  const mat = new THREE.MeshPhongMaterial({ 
    color: colors[Math.floor(Math.random() * colors.length)],
    emissive: 0x1d4ed8,
    emissiveIntensity: 0.2,
    shininess: 100 
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(
    (Math.random() - 0.5) * 12,
    (Math.random() - 0.5) * 8,
    (Math.random() - 0.5) * 4
  );
  mesh.userData = {
    velocity: new THREE.Vector3((Math.random() - 0.5) * 0.005, (Math.random() - 0.5) * 0.005, (Math.random() - 0.5) * 0.005),
    originalPos: mesh.position.clone()
  };
  nodes.push(mesh);
  group.add(mesh);
}

// Connections
const lineMat = new THREE.LineBasicMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.1 });
const lineGeo = new THREE.BufferGeometry();
const linePositions = new Float32Array(nodes.length * nodes.length * 3);
lineGeo.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
const lineMesh = new THREE.LineSegments(lineGeo, lineMat);
group.add(lineMesh);

const light = new THREE.PointLight(0xffffff, 1, 100);
light.position.set(10, 10, 10);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

function animate() {
  requestAnimationFrame(animate);
  
  const positions = lineMesh.geometry.attributes.position.array;
  let counter = 0;

  nodes.forEach((node, i) => {
    node.position.add(node.userData.velocity);
    if (Math.abs(node.position.x) > 6) node.userData.velocity.x *= -1;
    if (Math.abs(node.position.y) > 4) node.userData.velocity.y *= -1;
    if (Math.abs(node.position.z) > 2) node.userData.velocity.z *= -1;

    // Connect close nodes
    for (let j = i + 1; j < nodes.length; j++) {
      const dist = node.position.distanceTo(nodes[j].position);
      if (dist < 3) {
        positions[counter++] = node.position.x;
        positions[counter++] = node.position.y;
        positions[counter++] = node.position.z;
        positions[counter++] = nodes[j].position.x;
        positions[counter++] = nodes[j].position.y;
        positions[counter++] = nodes[j].position.z;
      }
    }
  });

  lineMesh.geometry.attributes.position.needsUpdate = true;
  lineMesh.geometry.setDrawRange(0, counter / 3);

  group.rotation.y += 0.001;
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  const w = container.clientWidth || window.innerWidth;
  const h = container.clientHeight || window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

animate();
})();
</script>

<!-- Lightweight interaction script for demonstration purposes -->
<script>
        document.addEventListener("DOMContentLoaded", () => {
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            const gridItems = document.querySelectorAll('#status-grid > div');
            
            let progress = 5;
            let currentStep = 0;

            // Initialize first step
            if(gridItems.length > 0) {
                gridItems[0].classList.add('active');
                gridItems[0].querySelector('.font-body-sm').textContent = "Aggregating...";
            }

            const interval = setInterval(() => {
                // Simulate progress
                progress += Math.random() * 2;
                if(progress > 99) progress = 99; // Hold at 99% for effect
                
                progressBar.style.width = `${progress}%`;
                progressText.textContent = `${Math.floor(progress)}%`;

                // Simulate step transitions based on progress
                if (progress > 25 && currentStep === 0) {
                    completeStep(0);
                    activateStep(1, "Organizing ledgers...");
                    currentStep = 1;
                } else if (progress > 50 && currentStep === 1) {
                    completeStep(1);
                    activateStep(2, "Identifying patterns...");
                    currentStep = 2;
                } else if (progress > 75 && currentStep === 2) {
                    completeStep(2);
                    activateStep(3, "Finalizing logic...");
                    currentStep = 3;
                }

            }, 800);

            function completeStep(index) {
                if(gridItems[index]) {
                    gridItems[index].classList.remove('active');
                    gridItems[index].classList.add('complete');
                    gridItems[index].querySelector('.font-body-sm').textContent = "Complete";
                }
            }

            function activateStep(index, text) {
                if(gridItems[index]) {
                    gridItems[index].classList.add('active');
                    gridItems[index].querySelector('.font-body-sm').textContent = text;
                }
            }
        });
    </script>
