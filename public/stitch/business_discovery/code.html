</button>

<script>
        function selectOption(element, group) {
            // Remove active class from all in the group
            const options = element.parentElement.querySelectorAll('.option-card');
            options.forEach(opt => opt.classList.remove('active', 'border-brand-accent', 'bg-[#FEF3F2]'));
            
            // Add to current
            element.classList.add('active', 'border-brand-accent', 'bg-[#FEF3F2]');
            
            // Interaction effect
            element.style.transform = 'scale(0.98)';
            setTimeout(() => {
                element.style.transform = 'scale(1)';
            }, 100);
        }

        function selectChip(element) {
            const isSelected = element.classList.contains('bg-brand-accent');
            
            if (isSelected) {
                element.classList.remove('bg-brand-accent', 'text-white', 'border-brand-accent');
                element.classList.add('border-outline-variant', 'text-on-surface-variant');
            } else {
                // Single select for this logic, but can be multi
                const chips = element.parentElement.querySelectorAll('button');
                chips.forEach(c => {
                    c.classList.remove('bg-brand-accent', 'text-white', 'border-brand-accent');
                    c.classList.add('border-outline-variant', 'text-on-surface-variant');
                });
                
                element.classList.add('bg-brand-accent', 'text-white', 'border-brand-accent');
                element.classList.remove('border-outline-variant', 'text-on-surface-variant');
            }
        }

        // Micro-interaction: Fade in main content
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('main > div');
            container.style.opacity = '0';
            container.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
