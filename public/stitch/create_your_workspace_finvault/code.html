<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Your Workspace | FinVault AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=Geist:wght@400;500;600;700&amp;family=Geist+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fb;
        }
        .font-headline { font-family: 'Geist', sans-serif; }
        .font-mono-data { font-family: 'Geist Mono', monospace; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .input-focus-ring:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 1px #000000;
        }

        .upload-area:hover {
            border-color: #000000;
            background-color: #f8fafc;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#e6e8ea",
                        "surface-container": "#eceef0",
                        "on-primary-fixed": "#131b2e",
                        "secondary-fixed-dim": "#b9c7e0",
                        "primary-container": "#131b2e",
                        "tertiary": "#000000",
                        "primary": "#000000",
                        "surface-bright": "#f7f9fb",
                        "inverse-on-surface": "#eff1f3",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#d5e3fd",
                        "surface-tint": "#565e74",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#dae2fd",
                        "error-container": "#ffdad6",
                        "on-surface-variant": "#45464d",
                        "on-background": "#191c1e",
                        "tertiary-fixed": "#6ffbbe",
                        "on-secondary-container": "#57657b",
                        "on-secondary": "#ffffff",
                        "outline": "#76777d",
                        "on-tertiary-fixed": "#002113",
                        "surface-container-low": "#f2f4f6",
                        "outline-variant": "#c6c6cd",
                        "on-error-container": "#93000a",
                        "secondary": "#515f74",
                        "surface-dim": "#d8dadc",
                        "on-surface": "#191c1e",
                        "on-primary-container": "#7c839b",
                        "on-error": "#ffffff",
                        "inverse-surface": "#2d3133",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#3f465c",
                        "tertiary-fixed-dim": "#4edea3",
                        "surface": "#f7f9fb",
                        "on-secondary-fixed": "#0d1c2f",
                        "on-secondary-fixed-variant": "#3a485c",
                        "error": "#ba1a1a",
                        "tertiary-container": "#002113",
                        "on-tertiary-fixed-variant": "#005236",
                        "inverse-primary": "#bec6e0",
                        "surface-container-highest": "#e0e3e5",
                        "on-tertiary-container": "#009668",
                        "surface-variant": "#e0e3e5",
                        "secondary-fixed": "#d5e3fd",
                        "background": "#f7f9fb",
                        "primary-fixed-dim": "#bec6e0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "40px",
                        "container-max": "1440px",
                        "section-gap": "64px",
                        "margin-mobile": "16px",
                        "base": "4px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "headline-md": ["Geist"],
                        "headline-lg": ["Geist"],
                        "body-lg": ["Inter"],
                        "label-md": ["Geist"],
                        "display-lg": ["Geist"],
                        "body-sm": ["Inter"],
                        "label-sm": ["Geist"],
                        "mono-data": ["Geist Mono"],
                        "body-md": ["Inter"]
                    }
                }
            }
        }

</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-primary selection:text-on-primary">
<!-- Atmospheric Background Animation -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">

</div>
<!-- Main Navigation Suppression Rule: 
         As per "Shell Visibility & Relevance", this is a Transactional/Onboarding page. 
         Navigation shell is hidden. 
    -->
<main class="w-full max-w-[480px] animate-fade-in">
<!-- Logo Branding -->
<div class="flex flex-col items-center mb-10">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center mb-4 shadow-sm">
<span class="material-symbols-outlined text-on-primary text-2xl">hub</span>
</div>
<h2 class="font-headline-md text-headline-md font-bold text-primary tracking-tight">FinVault AI</h2>
</div>
<!-- Create Workspace Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-2xl p-10 shadow-[0px_10px_30px_rgba(15,23,42,0.04)]">
<div class="mb-8">
<h1 class="font-headline-lg text-headline-lg text-primary mb-2">Create Your Workspace</h1>
<p class="font-body-md text-on-surface-variant">Set up your intelligence hub. This is where your financial data and AI insights will live.</p>
</div>
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Workspace Name Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="workspace_name">Workspace Name</label>
<input class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-white font-body-md text-on-surface placeholder:text-outline-variant transition-all input-focus-ring" id="workspace_name" placeholder="Acme Technologies" type="text"/>
</div>
<!-- Company Logo Upload -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2">
                        Company Logo <span class="text-outline-variant font-normal">(Optional)</span>
</label>
<div class="relative group">
<label class="upload-area flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-outline-variant rounded-xl cursor-pointer transition-all" for="logo_upload">
<div class="flex flex-col items-center justify-center pt-5 pb-6">
<span class="material-symbols-outlined text-outline-variant mb-2 group-hover:text-primary transition-colors">upload_file</span>
<p class="font-label-sm text-label-sm text-on-surface-variant">Click to upload or drag and drop</p>
<p class="text-[10px] text-outline-variant mt-1 uppercase tracking-wider font-semibold">SVG, PNG, or JPG (max. 2MB)</p>
</div>
<input accept="image/*" class="hidden" id="logo_upload" type="file"/>
</label>
</div>
</div>
<!-- Primary CTA -->
<div class="pt-2">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-4 rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
                        Continue
                        <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<div class="flex items-center justify-center mt-6 gap-2">
<span class="material-symbols-outlined text-[16px] text-on-tertiary-container">timer</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Est. completion: 10 seconds</span>
</div>
</div>
</form>
</div>
<!-- Footer Help -->
<footer class="mt-8 text-center">
<p class="font-body-sm text-body-sm text-outline-variant">
                Need help? <a class="text-on-surface-variant font-medium hover:text-primary transition-colors" href="#">Contact Support</a>
</p>
</footer>
</main>
<script>
        // Micro-interaction for the upload area
        const uploadArea = document.querySelector('.upload-area');
        const fileInput = document.getElementById('logo_upload');

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('bg-surface-container-low');
            uploadArea.classList.add('border-primary');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('bg-surface-container-low');
            uploadArea.classList.remove('border-primary');
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const fileName = e.target.files[0].name;
                uploadArea.querySelector('p').innerText = `File: ${fileName}`;
                uploadArea.classList.add('border-primary');
            }
        });

        // Button click effect
        const continueBtn = document.querySelector('button[type="submit"]');
        continueBtn.addEventListener('click', () => {
            continueBtn.innerHTML = `
                <span class="animate-spin material-symbols-outlined text-[18px]">progress_activity</span>
                Setting up...
            `;
            setTimeout(() => {
                // Simulated redirect or success state
                console.log('Workspace creation initiated');
            }, 1000);
        });
    </script>
</body></html>
